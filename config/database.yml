default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch("DB_HOST") { "localhost" } %>
  username: <%= ENV.fetch("DB_USERNAME") { "user" } %>
  password: <%= ENV.fetch("DB_PASSWORD") { "user" } %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: polyclinic_development

test:
  <<: *default
  database: polyclinic_test

